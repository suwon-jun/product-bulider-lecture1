<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 추천</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: linear-gradient(135deg, #0d0d1a 0%, #1a1040 50%, #0a1628 100%);
      --text: #ffffff;
      --text-sub: #8892a4;
      --text-muted: #718096;
      --text-faint: #4a5568;
      --card-bg: rgba(255,255,255,0.05);
      --card-border: rgba(255,255,255,0.1);
      --card-border2: rgba(255,255,255,0.07);
      --selector-bg: rgba(255,255,255,0.07);
      --selector-border: rgba(255,255,255,0.12);
      --select-option-bg: #1a1a2e;
      --copy-bg: rgba(255,255,255,0.08);
      --copy-border: rgba(255,255,255,0.15);
      --copy-color: #a0aec0;
      --copy-hover-bg: rgba(255,255,255,0.15);
      --copy-hover-color: #fff;
      --placeholder-bg: rgba(255,255,255,0.03);
      --placeholder-border: rgba(255,255,255,0.1);
      --placeholder-color: #4a5568;
      --history-bg: rgba(255,255,255,0.04);
      --history-border: rgba(255,255,255,0.07);
      --scrollbar: #2d3748;
      --toggle-bg: rgba(255,255,255,0.1);
      --toggle-border: rgba(255,255,255,0.15);
      --toggle-color: #a0aec0;
      --toggle-hover: rgba(255,255,255,0.18);
    }

    [data-theme="light"] {
      --bg: linear-gradient(135deg, #f0f4ff 0%, #e8eeff 50%, #f5f0ff 100%);
      --text: #1a1a2e;
      --text-sub: #5a6475;
      --text-muted: #64748b;
      --text-faint: #94a3b8;
      --card-bg: rgba(255,255,255,0.75);
      --card-border: rgba(0,0,0,0.08);
      --card-border2: rgba(0,0,0,0.06);
      --selector-bg: rgba(255,255,255,0.8);
      --selector-border: rgba(0,0,0,0.1);
      --select-option-bg: #ffffff;
      --copy-bg: rgba(0,0,0,0.05);
      --copy-border: rgba(0,0,0,0.1);
      --copy-color: #64748b;
      --copy-hover-bg: rgba(0,0,0,0.1);
      --copy-hover-color: #1a1a2e;
      --placeholder-bg: rgba(255,255,255,0.5);
      --placeholder-border: rgba(0,0,0,0.1);
      --placeholder-color: #94a3b8;
      --history-bg: rgba(255,255,255,0.6);
      --history-border: rgba(0,0,0,0.07);
      --scrollbar: #cbd5e0;
      --toggle-bg: rgba(0,0,0,0.06);
      --toggle-border: rgba(0,0,0,0.1);
      --toggle-color: #64748b;
      --toggle-hover: rgba(0,0,0,0.1);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      color: var(--text);
      padding: 24px 16px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .container { width: 100%; max-width: 680px; }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      color: var(--toggle-color);
      border-radius: 50px;
      padding: 8px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, color 0.2s;
      z-index: 100;
    }

    .theme-toggle:hover { background: var(--toggle-hover); }

    .theme-icon { font-size: 1rem; }

    /* Header */
    .header { text-align: center; margin-bottom: 32px; }

    .header h1 {
      font-size: 2.6rem;
      font-weight: 800;
      background: linear-gradient(90deg, #f7971e, #ffd200, #f7971e);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
      letter-spacing: -1px;
    }

    @keyframes shimmer { to { background-position: 200% center; } }

    .header p { margin-top: 6px; color: var(--text-sub); font-size: 0.95rem; }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .count-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--selector-bg);
      border: 1px solid var(--selector-border);
      border-radius: 50px;
      padding: 8px 16px;
      transition: background 0.3s, border-color 0.3s;
    }

    .count-selector label { font-size: 0.9rem; color: var(--text-muted); }

    .count-selector select {
      background: transparent;
      border: none;
      color: #f7971e;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      outline: none;
      padding: 0 4px;
    }

    .count-selector select option { background: var(--select-option-bg); color: var(--text); }

    .generate-btn {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      border: none;
      padding: 14px 44px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a1a2e;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 6px 24px rgba(247,151,30,0.45);
      letter-spacing: 0.3px;
    }

    .generate-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(247,151,30,0.6); }
    .generate-btn:active { transform: translateY(0); }
    .generate-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Ticket */
    .tickets-area { display: flex; flex-direction: column; gap: 16px; margin-bottom: 28px; }

    .ticket {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      animation: slideIn 0.35s ease forwards;
      opacity: 0;
      transform: translateY(20px);
      backdrop-filter: blur(8px);
      transition: background 0.3s, border-color 0.3s;
    }

    @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }

    .ticket-label { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; letter-spacing: 1px; min-width: 24px; }

    .balls { display: flex; gap: 10px; flex-wrap: wrap; flex: 1; justify-content: center; }

    .ball {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 6px 16px rgba(0,0,0,0.3), inset 0 -3px 6px rgba(0,0,0,0.2), inset 0 3px 6px rgba(255,255,255,0.25);
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
      opacity: 0;
      transform: scale(0) rotate(-180deg);
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    .ball.show { opacity: 1; transform: scale(1) rotate(0); }

    .b1 { background: linear-gradient(135deg, #f7971e, #fda085); }
    .b2 { background: linear-gradient(135deg, #4facfe, #00c9ff); }
    .b3 { background: linear-gradient(135deg, #f857a6, #ff5858); }
    .b4 { background: linear-gradient(135deg, #43e97b, #38f9d7); }
    .b5 { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }

    .copy-btn {
      background: var(--copy-bg);
      border: 1px solid var(--copy-border);
      color: var(--copy-color);
      font-size: 0.8rem;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    .copy-btn:hover { background: var(--copy-hover-bg); color: var(--copy-hover-color); }
    .copy-btn.copied { background: rgba(67,233,123,0.15); border-color: #43e97b; color: #43e97b; }

    /* Placeholder */
    .placeholder-box {
      background: var(--placeholder-bg);
      border: 2px dashed var(--placeholder-border);
      border-radius: 20px;
      padding: 48px 24px;
      text-align: center;
      color: var(--placeholder-color);
      transition: background 0.3s, border-color 0.3s;
    }

    .placeholder-box .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .placeholder-box p { font-size: 0.95rem; }

    /* Stats bar */
    .info-bar { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; margin-bottom: 28px; }
    .info-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .info-value { font-size: 1.3rem; font-weight: 700; color: #f7971e; }
    .info-label { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.5px; }

    /* History */
    .history-section { margin-top: 8px; }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .history-header h2 { font-size: 0.85rem; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }

    .clear-btn { background: none; border: none; color: var(--text-faint); font-size: 0.8rem; cursor: pointer; transition: color 0.2s; }
    .clear-btn:hover { color: #e53e3e; }

    .history-list {
      list-style: none;
      max-height: 240px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar) transparent;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      background: var(--history-bg);
      border: 1px solid var(--history-border);
      border-radius: 14px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      animation: fadeIn 0.3s ease;
      transition: background 0.3s, border-color 0.3s;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .history-balls { display: flex; gap: 6px; flex-wrap: wrap; }

    .mini-ball {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }

    .history-time { font-size: 0.72rem; color: var(--text-faint); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(67,233,123,0.15);
      border: 1px solid #43e97b;
      color: #43e97b;
      padding: 10px 24px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      transition: transform 0.3s ease;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">
    <span class="theme-icon" id="themeIcon">☀️</span>
    <span id="themeLabel">라이트 모드</span>
  </button>

  <div class="container">
    <div class="header">
      <h1>🎱 로또 번호 추천기</h1>
      <p>오늘의 행운 번호를 뽑아보세요</p>
    </div>

    <div class="controls">
      <div class="count-selector">
        <label>게임 수</label>
        <select id="countSelect">
          <option value="1">1게임</option>
          <option value="2">2게임</option>
          <option value="3" selected>3게임</option>
          <option value="4">4게임</option>
          <option value="5">5게임</option>
        </select>
      </div>
      <button class="generate-btn" id="generateBtn" onclick="generateAll()">
        ✨ 번호 생성
      </button>
    </div>

    <div id="ticketsArea" class="tickets-area">
      <div class="placeholder-box">
        <div class="icon">🎰</div>
        <p>버튼을 눌러 행운의 번호를 뽑아보세요!</p>
      </div>
    </div>

    <div class="info-bar" id="infoBar" style="display:none">
      <div class="info-item">
        <span class="info-value" id="totalGames">0</span>
        <span class="info-label">총 게임</span>
      </div>
      <div class="info-item">
        <span class="info-value" id="totalSessions">0</span>
        <span class="info-label">시도 횟수</span>
      </div>
      <div class="info-item">
        <span class="info-value" id="hotNum">-</span>
        <span class="info-label">자주 나온 번호</span>
      </div>
    </div>

    <div class="history-section" id="historySection" style="display:none">
      <div class="history-header">
        <h2>이전 기록</h2>
        <button class="clear-btn" onclick="clearHistory()">전체 삭제</button>
      </div>
      <ul class="history-list" id="historyList"></ul>
    </div>
  </div>

  <div class="toast" id="toast">복사되었습니다!</div>

  <script>
    const historyData = [];
    const allGeneratedNums = [];
    let totalGames = 0;
    let totalSessions = 0;
    let isDark = true;

    function toggleTheme() {
      isDark = !isDark;
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙';
      document.getElementById('themeLabel').textContent = isDark ? '라이트 모드' : '다크 모드';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    (function initTheme() {
      const saved = localStorage.getItem('theme');
      if (saved === 'light') {
        isDark = false;
        document.documentElement.setAttribute('data-theme', 'light');
        document.getElementById('themeIcon').textContent = '🌙';
        document.getElementById('themeLabel').textContent = '다크 모드';
      }
    })();

    function getBallClass(n) {
      if (n <= 10) return 'b1';
      if (n <= 20) return 'b2';
      if (n <= 30) return 'b3';
      if (n <= 40) return 'b4';
      return 'b5';
    }

    function pickNumbers() {
      const nums = [];
      while (nums.length < 6) {
        const n = Math.floor(Math.random() * 45) + 1;
        if (!nums.includes(n)) nums.push(n);
      }
      return nums.sort((a, b) => a - b);
    }

    function generateAll() {
      const btn = document.getElementById('generateBtn');
      const count = parseInt(document.getElementById('countSelect').value);
      const area = document.getElementById('ticketsArea');

      btn.disabled = true;
      area.innerHTML = '';

      const session = [];

      for (let g = 0; g < count; g++) {
        const nums = pickNumbers();
        session.push(nums);
        allGeneratedNums.push(...nums);
        totalGames++;

        const ticket = document.createElement('div');
        ticket.className = 'ticket';
        ticket.style.animationDelay = `${g * 80}ms`;

        const label = document.createElement('span');
        label.className = 'ticket-label';
        label.textContent = String.fromCharCode(65 + g);
        ticket.appendChild(label);

        const ballsDiv = document.createElement('div');
        ballsDiv.className = 'balls';

        nums.forEach((num, i) => {
          const ball = document.createElement('div');
          ball.className = `ball ${getBallClass(num)}`;
          ball.textContent = num;
          ballsDiv.appendChild(ball);
          setTimeout(() => ball.classList.add('show'), g * 100 + i * 80 + 80);
        });

        ticket.appendChild(ballsDiv);

        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = '복사';
        copyBtn.onclick = () => copyNumbers(nums, copyBtn);
        ticket.appendChild(copyBtn);

        area.appendChild(ticket);
      }

      totalSessions++;
      historyData.unshift({ session, time: new Date() });
      if (historyData.length > 20) historyData.pop();

      const delay = count * 100 + 6 * 80 + 200;
      setTimeout(() => {
        btn.disabled = false;
        updateStats();
        renderHistory();
      }, delay);
    }

    function copyNumbers(nums, btn) {
      const text = nums.join(', ');
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ 복사됨';
        btn.classList.add('copied');
        showToast('번호가 복사되었습니다!');
        setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
      });
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function updateStats() {
      document.getElementById('infoBar').style.display = 'flex';
      document.getElementById('totalGames').textContent = totalGames;
      document.getElementById('totalSessions').textContent = totalSessions;
      if (allGeneratedNums.length > 0) {
        const freq = {};
        allGeneratedNums.forEach(n => { freq[n] = (freq[n] || 0) + 1; });
        const hot = Object.entries(freq).sort((a, b) => b[1] - a[1])[0][0];
        document.getElementById('hotNum').textContent = hot;
      }
    }

    function renderHistory() {
      if (historyData.length === 0) {
        document.getElementById('historySection').style.display = 'none';
        return;
      }
      document.getElementById('historySection').style.display = 'block';
      const list = document.getElementById('historyList');
      list.innerHTML = '';
      historyData.forEach(({ session, time }) => {
        const li = document.createElement('li');
        li.className = 'history-item';
        const ballsWrap = document.createElement('div');
        ballsWrap.style.display = 'flex';
        ballsWrap.style.flexDirection = 'column';
        ballsWrap.style.gap = '6px';
        session.forEach(nums => {
          const row = document.createElement('div');
          row.className = 'history-balls';
          nums.forEach(n => {
            const span = document.createElement('span');
            span.className = `mini-ball ${getBallClass(n)}`;
            span.textContent = n;
            row.appendChild(span);
          });
          ballsWrap.appendChild(row);
        });
        const timeEl = document.createElement('span');
        timeEl.className = 'history-time';
        timeEl.textContent = time.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        li.appendChild(ballsWrap);
        li.appendChild(timeEl);
        list.appendChild(li);
      });
    }

    function clearHistory() {
      historyData.length = 0;
      renderHistory();
    }
  </script>
</body>
</html>
