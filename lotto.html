<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 추천</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 40px 20px;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1rem;
      color: #a0aec0;
      margin-bottom: 40px;
    }

    .balls-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 40px;
      min-height: 80px;
      align-items: center;
    }

    .ball {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4), inset 0 -4px 8px rgba(0,0,0,0.2), inset 0 4px 8px rgba(255,255,255,0.2);
      opacity: 0;
      transform: scale(0) rotate(-180deg);
      transition: opacity 0.4s ease, transform 0.4s ease;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    .ball.show {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    .ball-1-10  { background: linear-gradient(135deg, #f7971e, #fda085); }
    .ball-11-20 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    .ball-21-30 { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .ball-31-40 { background: linear-gradient(135deg, #43e97b, #38f9d7); }
    .ball-41-45 { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }

    .generate-btn {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      border: none;
      padding: 16px 48px;
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a1a2e;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 24px rgba(247, 151, 30, 0.4);
      letter-spacing: 0.5px;
    }

    .generate-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(247, 151, 30, 0.6);
    }

    .generate-btn:active {
      transform: translateY(0);
    }

    .generate-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .history {
      margin-top: 40px;
    }

    .history h2 {
      font-size: 1rem;
      color: #718096;
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .history-list {
      list-style: none;
      max-height: 200px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #4a5568 transparent;
    }

    .history-list li {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .mini-ball {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }

    .placeholder {
      color: #4a5568;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎱 로또 번호 추천</h1>
    <p class="subtitle">행운의 번호를 뽑아보세요!</p>

    <div class="balls-container" id="ballsContainer">
      <span class="placeholder">버튼을 눌러 번호를 생성하세요</span>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generateLotto()">
      번호 생성
    </button>

    <div class="history" id="historySection" style="display:none">
      <h2>이전 번호</h2>
      <ul class="history-list" id="historyList"></ul>
    </div>
  </div>

  <script>
    const history = [];

    function getBallClass(num) {
      if (num <= 10) return 'ball-1-10';
      if (num <= 20) return 'ball-11-20';
      if (num <= 30) return 'ball-21-30';
      if (num <= 40) return 'ball-31-40';
      return 'ball-41-45';
    }

    function generateLotto() {
      const btn = document.getElementById('generateBtn');
      const container = document.getElementById('ballsContainer');

      btn.disabled = true;
      container.innerHTML = '';

      const nums = [];
      while (nums.length < 6) {
        const n = Math.floor(Math.random() * 45) + 1;
        if (!nums.includes(n)) nums.push(n);
      }
      nums.sort((a, b) => a - b);

      nums.forEach((num, i) => {
        const ball = document.createElement('div');
        ball.className = `ball ${getBallClass(num)}`;
        ball.textContent = num;
        container.appendChild(ball);
        setTimeout(() => ball.classList.add('show'), 80 * i + 50);
      });

      history.unshift(nums);
      if (history.length > 10) history.pop();
      renderHistory();

      setTimeout(() => { btn.disabled = false; }, 600);
    }

    function renderHistory() {
      const section = document.getElementById('historySection');
      const list = document.getElementById('historyList');

      if (history.length <= 1) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      list.innerHTML = '';

      history.slice(1).forEach(nums => {
        const li = document.createElement('li');
        nums.forEach(n => {
          const span = document.createElement('span');
          span.className = `mini-ball ${getBallClass(n)}`;
          span.textContent = n;
          li.appendChild(span);
        });
        list.appendChild(li);
      });
    }
  </script>
</body>
</html>
